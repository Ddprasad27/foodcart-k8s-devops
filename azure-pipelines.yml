trigger:
  branches:
    include:
      - main

variables:
  ACR_NAME: "foodcartacr7330"
  AKS_RG: "foodcart-rg"
  AKS_NAME: "foodcart-aks"
  IMAGE_TAG: $(Build.BuildId)

stages:
- stage: Build
  displayName: "Build and Push Docker Images"
  jobs:
  - job: BuildImages
    pool:
      vmImage: "ubuntu-latest"
    steps:
    - task: AzureCLI@2
      displayName: "Build and Push Backend"
      inputs:
        azureSubscription: "DP_service"
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(ACR_NAME)
          docker build -t $(ACR_NAME).azurecr.io/foodcart-backend:$(IMAGE_TAG) ./backend
          docker push $(ACR_NAME).azurecr.io/foodcart-backend:$(IMAGE_TAG)

    - task: AzureCLI@2
      displayName: "Build and Push Frontend"
      inputs:
        azureSubscription: "DP_service"
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name $(ACR_NAME)
          docker build -t $(ACR_NAME).azurecr.io/foodcart-frontend:$(IMAGE_TAG) ./frontend
          docker push $(ACR_NAME).azurecr.io/foodcart-frontend:$(IMAGE_TAG)

- stage: Deploy
  displayName: "Deploy to AKS"
  dependsOn: Build
  jobs:
  - deployment: DeployToAKS
    displayName: "Deploy to Kubernetes"
    environment: "foodcart-production"
    pool:
      vmImage: "ubuntu-latest"
    strategy:
      runOnce:
        deploy:
          steps:
          - checkout: self
          - task: AzureCLI@2
            displayName: "Deploy to AKS"
            inputs:
              azureSubscription: "DP_service"
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials --resource-group $(AKS_RG) --name $(AKS_NAME)
                sed -i "s|foodcartacr7330.azurecr.io/foodcart-backend:latest|$(ACR_NAME).azurecr.io/foodcart-backend:$(IMAGE_TAG)|g" k8s/backend.yaml
                sed -i "s|foodcartacr7330.azurecr.io/foodcart-frontend:latest|$(ACR_NAME).azurecr.io/foodcart-frontend:$(IMAGE_TAG)|g" k8s/frontend.yaml
                kubectl apply -f k8s/mongodb.yaml
                kubectl apply -f k8s/backend.yaml
                kubectl apply -f k8s/frontend.yaml
                kubectl rollout status deployment/backend
                kubectl rollout status deployment/frontend
                echo "App URL:"
                sleep 30
                kubectl get service frontend-service
